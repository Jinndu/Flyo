<body>
  <div class="containers cont1">
    <div class="con1">
      <div class="logo">

    </div>
    <div class="icon">
      <div class="icon-box">
        <img src="images/icon-document.svg" alt="">
      </div>
      <div class="icon-box">
        <img src="images/icon-folder.svg" alt="">
      </div>
      <div class="icon-box">

    </div>
    </div>

      <div class="space">

  </div>
